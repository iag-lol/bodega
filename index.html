<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Bodega - Aseo</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="/js/googleSheets.js" type="module" defer></script>
    <script src="/js/login.js" type="module" defer></script>
    <script src="/js/bodega.js" type="module" defer></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Bienvenido, <span id="username"></span></h1>
            <button id="logoutBtn" class="btn-secondary">Cerrar Sesión</button>
        </header>

        <section class="summary">
            <div class="card" id="inventory-card"></div>
        </section>

        <section class="form-sections">
            <!-- Formulario de Ingreso -->
            <form id="add-supply-form">
                <input type="text" id="ingreso-item-name" placeholder="Nombre del Insumo">
                <input type="number" id="ingreso-item-quantity" placeholder="Cantidad">
                <button type="submit">Registrar Ingreso</button>
            </form>
        </section>

        <section id="tables-section">
            <table id="ingreso-table"></table>
        </section>
    </div>
</body>
</html>
